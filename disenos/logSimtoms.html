<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Symptom Registration | VitaTrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#414755",
                        "surface-variant": "#e2e2e7",
                        "on-secondary-fixed": "#1a1b1f",
                        "on-primary-container": "#fefcff",
                        "on-surface": "#1a1c1f",
                        "secondary-container": "#e0dfe4",
                        "surface-container-high": "#e8e8ed",
                        "surface-bright": "#f9f9fe",
                        "tertiary-fixed-dim": "#53e16f",
                        "surface-dim": "#d9dade",
                        "surface": "#f9f9fe",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c1c6d7",
                        "surface-container": "#ededf2",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f3f3f8",
                        "on-tertiary-fixed-variant": "#00531c",
                        "on-primary-fixed": "#001a41",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#004493",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#e3e2e7",
                        "tertiary": "#006b27",
                        "outline": "#717786",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "surface-tint": "#005bc1",
                        "on-tertiary-container": "#f7fff2",
                        "primary-fixed": "#d8e2ff",
                        "inverse-primary": "#adc6ff",
                        "inverse-surface": "#2e3034",
                        "inverse-on-surface": "#f0f0f5",
                        "secondary-fixed-dim": "#c6c6cb",
                        "on-tertiary-fixed": "#002107",
                        "on-background": "#1a1c1f",
                        "secondary": "#5d5e63",
                        "tertiary-fixed": "#72fe88",
                        "on-secondary-container": "#626267",
                        "primary-container": "#0070eb",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#46464b",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#008733",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-container-highest": "#e2e2e7",
                        "background": "#f9f9fe",
                        "primary": "#0058bc"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
            background-color: #f9f9fe;
            background-image: radial-gradient(at 0% 0%, #d8e2ff 0, transparent 50%), radial-gradient(at 100% 100%, #f3f3f8 0, transparent 50%);
            min-height: 100vh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9fe]/80 dark:bg-slate-950/80 backdrop-blur-md shadow-[0_20px_40px_rgba(26,28,31,0.04)] flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="professional portrait of a healthcare provider with a kind smile, clean clinical studio lighting, soft blurred background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCY94i59w7kQKNJTbOxZnhZOYsR587yUwy5TkVM_QgXpl3h8aeYk-1ZRXQ_SFpmZ7brHjv-CePrmVi4xSgZJOlCOGZomPleTPZlAwNbeSGi4pwdoNKGuddycLKF9j9Qo4RxzDFyHBuJeEmtUOWhh8qRmRuYkKxYniMt0x83Tm5aw8-FtTq7xwMtDCslkwtW3RTPJltT69RDda6NittxS_D_BxlexvpoM7Q-3F-SsZ-hoNqmXgM28PhW1GBQkg2liDwzVvmWN3gz6ww"/>
</div>
<span class="text-[#007AFF] font-['Manrope'] font-extrabold text-xl">VitaTrack</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#007AFF] hover:opacity-80 transition-opacity p-2 rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-4xl mx-auto">
<!-- Header Section -->
<div class="mb-12">
<h1 class="font-headline font-bold text-3xl text-on-surface tracking-tight mb-2">How are you feeling?</h1>
<p class="text-on-surface-variant text-lg">Log your symptoms to help track your recovery progress.</p>
</div>
<form class="space-y-8">
<!-- Symptom Selection: Bento Style -->
<section>
<h2 class="font-headline font-bold text-xl mb-6 text-primary">Select Symptoms</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<!-- Symptom Card 1: Active State -->
<label class="cursor-pointer group">
<input checked="" class="hidden peer" type="checkbox"/>
<div class="p-6 h-full flex flex-col items-center justify-center text-center bg-surface-container-lowest rounded-lg border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed transition-all duration-300 shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
<span class="material-symbols-outlined text-3xl mb-3 text-primary peer-checked:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">bedtime</span>
<span class="font-medium text-on-surface">Fatigue</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<div class="p-6 h-full flex flex-col items-center justify-center text-center bg-surface-container-lowest rounded-lg border-2 border-transparent hover:border-outline-variant peer-checked:border-primary transition-all duration-300 shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
<span class="material-symbols-outlined text-3xl mb-3 text-on-surface-variant group-hover:text-primary transition-colors">headset_mic</span>
<span class="font-medium text-on-surface">Headache</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<div class="p-6 h-full flex flex-col items-center justify-center text-center bg-surface-container-lowest rounded-lg border-2 border-transparent hover:border-outline-variant peer-checked:border-primary transition-all duration-300 shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
<span class="material-symbols-outlined text-3xl mb-3 text-on-surface-variant group-hover:text-primary transition-colors">personal_injury</span>
<span class="font-medium text-on-surface">Joint Pain</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<div class="p-6 h-full flex flex-col items-center justify-center text-center bg-surface-container-lowest rounded-lg border-2 border-transparent hover:border-outline-variant peer-checked:border-primary transition-all duration-300 shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
<span class="material-symbols-outlined text-3xl mb-3 text-on-surface-variant group-hover:text-primary transition-colors">thermostat</span>
<span class="font-medium text-on-surface">Fever</span>
</div>
</label>
</div>
</section>
<!-- Severity Slider Section -->
<section class="bg-surface-container-low p-8 rounded-lg">
<div class="flex items-center justify-between mb-8">
<h2 class="font-headline font-bold text-xl text-primary">Symptom Severity</h2>
<span class="px-4 py-1 bg-primary text-white font-bold rounded-full text-lg">7</span>
</div>
<div class="relative pt-6 pb-2">
<input class="w-full h-4 bg-surface-container rounded-lg appearance-none cursor-pointer accent-primary" max="10" min="1" type="range" value="7"/>
<div class="flex justify-between mt-6 text-sm font-medium text-on-surface-variant">
<div class="flex flex-col items-center">
<span class="w-1 h-3 bg-outline-variant mb-2"></span>
<span>Mild</span>
</div>
<div class="flex flex-col items-center">
<span class="w-1 h-3 bg-outline-variant mb-2"></span>
<span>Moderate</span>
</div>
<div class="flex flex-col items-center">
<span class="w-1 h-3 bg-outline-variant mb-2"></span>
<span>Severe</span>
</div>
</div>
</div>
</section>
<!-- DateTime and Details Bento -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
<div class="md:col-span-1 space-y-8">
<!-- Date Picker -->
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
<label class="block font-headline font-bold text-primary mb-4">Date</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-md p-4 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all" type="date" value="2023-10-27"/>
</div>
</div>
<!-- Time Picker -->
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
<label class="block font-headline font-bold text-primary mb-4">Time</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-md p-4 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all" type="time" value="14:30"/>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="md:col-span-2">
<div class="bg-surface-container-lowest p-8 h-full rounded-lg shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
<label class="block font-headline font-bold text-primary mb-4">Additional Notes</label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg p-6 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all resize-none" placeholder="Describe how you're feeling in more detail..." rows="6"></textarea>
</div>
</div>
</div>
<!-- Submit Action -->
<div class="pt-8">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-xl py-6 rounded-lg shadow-[0_20px_40px_rgba(0,88,188,0.2)] hover:scale-[1.02] active:scale-95 transition-all duration-300" type="submit">
                    Save Symptom Log
                </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#f9f9fe]/80 dark:bg-slate-950/80 backdrop-blur-md border-t border-[#c1c6d7]/15 z-50">
<a class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-2xl" href="#">
<span class="material-symbols-outlined text-2xl mb-1">home_health</span>
<span class="font-['Inter'] font-medium text-[10px]">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-2xl" href="#">
<span class="material-symbols-outlined text-2xl mb-1">medical_services</span>
<span class="font-['Inter'] font-medium text-[10px]">Meds</span>
</a>
<a class="flex flex-col items-center justify-center text-[#007AFF] bg-[#d8e2ff]/30 rounded-2xl px-4 py-1 scale-110 transition-transform duration-300" href="#">
<span class="material-symbols-outlined text-2xl mb-1 active-icon">monitoring</span>
<span class="font-['Inter'] font-medium text-[10px]">Vitals</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-2xl" href="#">
<span class="material-symbols-outlined text-2xl mb-1">chat_bubble</span>
<span class="font-['Inter'] font-medium text-[10px]">Chat</span>
</a>
</nav>
<!-- Decorative Mesh Background Element -->
<div class="fixed top-1/4 -right-20 w-96 h-96 bg-primary-fixed/20 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-1/4 -left-20 w-80 h-80 bg-tertiary-fixed/10 rounded-full blur-[100px] -z-10"></div>
</body></html>
