<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VitaTrack - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#f7fff2",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9fe",
                        "secondary-fixed-dim": "#c6c6cb",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-fixed-variant": "#46464b",
                        "secondary-fixed": "#e3e2e7",
                        "surface-variant": "#e2e2e7",
                        "on-tertiary-fixed": "#002107",
                        "tertiary-fixed-dim": "#53e16f",
                        "surface-dim": "#d9dade",
                        "on-primary-fixed": "#001a41",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2e3034",
                        "surface-container-highest": "#e2e2e7",
                        "surface-container": "#ededf2",
                        "surface-container-high": "#e8e8ed",
                        "inverse-on-surface": "#f0f0f5",
                        "outline-variant": "#c1c6d7",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#008733",
                        "on-surface": "#1a1c1f",
                        "secondary-container": "#e0dfe4",
                        "secondary": "#5d5e63",
                        "outline": "#717786",
                        "surface-tint": "#005bc1",
                        "error": "#ba1a1a",
                        "primary-container": "#0070eb",
                        "on-secondary": "#ffffff",
                        "tertiary": "#006b27",
                        "on-surface-variant": "#414755",
                        "tertiary-fixed": "#72fe88",
                        "on-background": "#1a1c1f",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-fixed-variant": "#004493",
                        "surface-container-low": "#f3f3f8",
                        "primary": "#0058bc",
                        "on-secondary-container": "#626267",
                        "inverse-primary": "#adc6ff",
                        "on-primary-container": "#fefcff",
                        "on-tertiary-fixed-variant": "#00531c",
                        "on-error-container": "#93000a",
                        "background": "#f9f9fe",
                        "surface": "#f9f9fe",
                        "on-secondary-fixed": "#1a1b1f"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .clinical-shadow {
            box-shadow: 0 20px 40px rgba(26, 28, 31, 0.04);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 glass-header clinical-shadow">
        <div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
            <div class="flex items-center gap-4">
                <button class="text-blue-600 active:scale-95 transition-transform duration-200">
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                </button>
                <span class="font-headline font-extrabold text-xl tracking-tighter text-blue-700">VitaTrack</span>
            </div>
            <div class="hidden md:flex gap-8">
                <!-- Navigation links suppressed for login screen context -->
            </div>
            <div class="w-10"></div> <!-- Spacer for symmetry on mobile -->
        </div>
    </header>
    <!-- Main Content Area -->
    <main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
        <div class="w-full max-w-md">
            <!-- Asymmetric Editorial Element -->
            <div class="relative mb-12">
                <div class="absolute -top-6 -left-6 w-24 h-24 bg-primary/5 rounded-full blur-3xl"></div>
                <h1 class="font-headline font-bold text-4xl text-on-surface tracking-tight leading-tight">
                    Bienvenido de <span class="text-primary">nuevo.</span>
                </h1>
                <p class="mt-4 text-on-surface-variant body-lg max-w-[280px]">
                    Accede a tu panel de salud integral y monitoreo clínico.
                </p>
            </div>
            <!-- Login Form Card -->
            <div class="bg-surface-container-lowest rounded-lg p-8 clinical-shadow">
                <form class="space-y-6">
                    <!-- Email Field -->
                    <div class="space-y-2">
                        <label class="font-label font-medium text-on-surface-variant block ml-1" for="email">
                            Correo electrónico
                        </label>
                        <div class="relative group">
                            <input
                                class="w-full h-14 px-5 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50"
                                id="email" name="email" placeholder="nombre@ejemplo.com" type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="font-label font-medium text-on-surface-variant" for="password">
                                Contraseña
                            </label>
                            <a class="text-[13px] font-medium text-primary hover:opacity-80 transition-opacity"
                                href="#">
                                ¿Olvidaste tu contraseña?
                            </a>
                        </div>
                        <div class="relative group">
                            <input
                                class="w-full h-14 px-5 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50"
                                id="password" name="password" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <!-- CTA Button -->
                    <div class="pt-4">
                        <button
                            class="w-full h-16 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-md clinical-shadow active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2"
                            type="submit">
                            Iniciar sesión
                            <span class="material-symbols-outlined text-xl" data-icon="login">login</span>
                        </button>
                    </div>
                </form>
                <!-- Footer Links -->
                <div class="mt-10 pt-8 border-t border-surface-container flex flex-col items-center gap-4">
                    <p class="text-on-surface-variant body-lg">
                        ¿No tienes una cuenta?
                    </p>
                    <a class="w-full h-14 flex items-center justify-center bg-surface-container-high text-on-surface font-semibold rounded-md hover:bg-surface-container-highest transition-colors"
                        href="#">
                        Crear cuenta
                    </a>
                </div>
            </div>
            <!-- Decorative Health Horizon Element -->
            <div class="mt-16 flex items-center justify-center gap-12 opacity-40 grayscale pointer-events-none">
                <div class="flex flex-col items-center gap-2">
                    <span class="material-symbols-outlined text-3xl" data-icon="ecg_heart">ecg_heart</span>
                    <span class="font-label text-[10px] uppercase tracking-widest">Precisión</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="material-symbols-outlined text-3xl" data-icon="encrypted">encrypted</span>
                    <span class="font-label text-[10px] uppercase tracking-widest">Seguridad</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="material-symbols-outlined text-3xl" data-icon="clinical_notes">clinical_notes</span>
                    <span class="font-label text-[10px] uppercase tracking-widest">Privacidad</span>
                </div>
            </div>
        </div>
    </main>
    <!-- Visual Background Signature -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary-fixed/20 blur-[120px] rounded-full">
        </div>
        <div class="absolute bottom-[-5%] left-[-10%] w-[30%] h-[30%] bg-tertiary-fixed/10 blur-[100px] rounded-full">
        </div>
    </div>
</body>

</html>
