<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VitaTrack - Recuperar Contraseña</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#f7fff2",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9fe",
                        "secondary-fixed-dim": "#c6c6cb",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-fixed-variant": "#46464b",
                        "secondary-fixed": "#e3e2e7",
                        "surface-variant": "#e2e2e7",
                        "on-tertiary-fixed": "#002107",
                        "tertiary-fixed-dim": "#53e16f",
                        "surface-dim": "#d9dade",
                        "on-primary-fixed": "#001a41",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2e3034",
                        "surface-container-highest": "#e2e2e7",
                        "surface-container": "#ededf2",
                        "surface-container-high": "#e8e8ed",
                        "inverse-on-surface": "#f0f0f5",
                        "outline-variant": "#c1c6d7",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#008733",
                        "on-surface": "#1a1c1f",
                        "secondary-container": "#e0dfe4",
                        "secondary": "#5d5e63",
                        "outline": "#717786",
                        "surface-tint": "#005bc1",
                        "error": "#ba1a1a",
                        "primary-container": "#0070eb",
                        "on-secondary": "#ffffff",
                        "tertiary": "#006b27",
                        "on-surface-variant": "#414755",
                        "tertiary-fixed": "#72fe88",
                        "on-background": "#1a1c1f",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-fixed-variant": "#004493",
                        "surface-container-low": "#f3f3f8",
                        "primary": "#0058bc",
                        "on-secondary-container": "#626267",
                        "inverse-primary": "#adc6ff",
                        "on-primary-container": "#fefcff",
                        "on-tertiary-fixed-variant": "#00531c",
                        "on-error-container": "#93000a",
                        "background": "#f9f9fe",
                        "surface": "#f9f9fe",
                        "on-secondary-fixed": "#1a1b1f"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #f9f9fe;
            background-image: radial-gradient(at 0% 0%, #d8e2ff 0px, transparent 50%), radial-gradient(at 100% 0%, #f9f9fe 0px, transparent 50%);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="font-body text-on-surface min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-lg shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
        <div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
            <div class="flex items-center gap-4">
                <button class="text-blue-600 active:scale-95 transition-transform duration-200 hover:opacity-80">
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                </button>
                <span class="font-['Manrope'] font-bold text-xl tracking-tight text-blue-700">VitaTrack</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <!-- Navigation links suppressed for transactional screen per mandate -->
            </div>
        </div>
    </nav>
    <!-- Main Content Canvas -->
    <main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
        <div class="w-full max-w-md">
            <!-- Asymmetric Editorial Header -->
            <header class="mb-12 relative">
                <div class="absolute -top-12 -left-8 w-24 h-24 bg-primary-fixed opacity-20 rounded-full blur-3xl"></div>
                <h1 class="font-headline font-extrabold text-4xl text-on-surface tracking-tight leading-tight mb-4">
                    Recuperar <br />
                    <span class="text-primary">Contraseña</span>
                </h1>
                <p class="text-on-surface-variant text-lg leading-relaxed max-w-[280px]">
                    Ingresa tu correo para recibir un enlace de recuperación
                </p>
            </header>
            <!-- Recovery Form Card -->
            <section
                class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_20px_40px_rgba(26,28,31,0.04)] relative overflow-hidden">
                <!-- Visual Accent -->
                <div class="absolute top-0 right-0 w-1 h-full bg-gradient-to-b from-primary to-primary-container"></div>
                <form action="#" class="space-y-8" method="POST">
                    <div class="space-y-2">
                        <label class="font-label text-sm font-semibold text-on-surface-variant ml-1" for="email">
                            Correo electrónico
                        </label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
                            <input
                                class="w-full h-14 pl-12 pr-4 bg-surface-container border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline"
                                id="email" name="email" placeholder="ejemplo@correo.com" required="" type="email" />
                        </div>
                    </div>
                    <button
                        class="w-full h-16 rounded-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all hover:opacity-90 flex items-center justify-center gap-3"
                        type="submit">
                        <span>Enviar enlace de recuperación</span>
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </form>
            </section>
            <!-- Trust Footer Section -->
            <footer class="mt-12 text-center space-y-6">
                <div class="flex items-center justify-center gap-4 text-outline-variant">
                    <div class="h-px w-8 bg-current"></div>
                    <span class="text-xs font-label uppercase tracking-widest text-on-surface-variant/60">Seguridad
                        Encriptada</span>
                    <div class="h-px w-8 bg-current"></div>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <div class="flex items-center gap-2 p-3 bg-tertiary-fixed/30 rounded-full px-4">
                        <span class="material-symbols-outlined text-tertiary text-sm" data-weight="fill"
                            style="font-variation-settings: 'FILL' 1;">verified_user</span>
                        <span class="text-xs font-medium text-on-tertiary-fixed-variant">Portal Médico Seguro</span>
                    </div>
                    <p class="text-sm text-on-surface-variant">
                        ¿Recordaste tu contraseña?
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Inicia
                            Sesión</a>
                    </p>
                </div>
            </footer>
        </div>
    </main>
    <!-- Imagery Integration (Editorial Placement) -->
    <div class="hidden lg:block fixed right-0 top-0 bottom-0 w-1/3 z-0 pointer-events-none">
        <div class="h-full w-full relative">
            <img alt="Médico profesional" class="h-full w-full object-cover opacity-10"
                data-alt="Modern clinical office interior with soft blue ambient lighting and high-tech medical equipment in a minimalist pharmaceutical setting"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLQ8Ksj1RuAs5K0e2Hb2o-lUdkuMdg1esD5krBfc-HC22gJh3WhBYXOZSwyJJGyDG_Ft3lNLaWnwvWfNYv20ObstAhXLHl1-kletH7fEI6lRDb_XDBafD0W58T6BCUlsxh-gcWqgqtMtwiGD6x6p7t96FImXUDq4sMfmMylgemZiw9GNmUB8MjhU_Y0kKn9r3eaOQS1eBAPfbIAsSgtLttkA3nLA8lYvPio7_C6A_ZceinjVQqBZATH728YC-hzHppqSqDUnfcSCU" />
            <div class="absolute inset-0 bg-gradient-to-l from-transparent to-background"></div>
        </div>
    </div>
    <!-- BottomNavBar Suppressed: This is a Transactional/Focused screen -->
</body>

</html>
