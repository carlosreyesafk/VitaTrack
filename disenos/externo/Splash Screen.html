<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VitaTrack | Clinical Sanctuary</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link

        rel="stylesheet" />

                extend: {

                        "secondary-fixed": "#e3e2e7",

                        "on-tertiary-fixed": "#002107",
                        "tertiary-fixed-dim": "#53e16f",
                        "surface-dim": "#d9dade",
                        "on-primary-fixed": "#001a41",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2e3034",
                        "surface-container-highest": "#e2e2e7",
                        "surface-container": "#ededf2",
                        "surface-container-high": "#e8e8ed",
                        "inverse-on-surface": "#f0f0f5",
                        "outline-variant": "#c1c6d7",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#008733",
                        "on-surface": "#1a1c1f",
                        "secondary-container": "#e0dfe4",
                        "secondary": "#5d5e63",
                        "outline": "#717786",
                        "surface-tint": "#005bc1",
                        "error": "#ba1a1a",
                        "primary-container": "#0070eb",
                        "on-secondary": "#ffffff",
                        "tertiary": "#006b27",
                        "on-surface-variant": "#414755",
                        "tertiary-fixed": "#72fe88",
                        "on-background": "#1a1c1f",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-fixed-variant": "#004493",
                        "surface-container-low": "#f3f3f8",
                        "primary": "#0058bc",
                        "on-secondary-container": "#626267",
                        "inverse-primary": "#adc6ff",
                        "on-primary-container": "#fefcff",
                        "on-tertiary-fixed-variant": "#00531c",
                        "on-error-container": "#93000a",
                        "background": "#f9f9fe",
                        "surface": "#f9f9fe",
                        "on-secondary-fixed": "#1a1b1f"

                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .health-horizon {
            background: radial-gradient(circle at 50% 50%, #d8e2ff 0%, #f9f9fe 70%);
        }

        .signature-gradient {
            background: linear-gradient(135deg, #0058bc 0%, #0070eb 100%);
        }

        .glass-effect {
            backdrop-filter: blur(20px);
            background: rgba(249, 249, 254, 0.8);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col overflow-hidden">
    <!-- The Health Horizon Background -->
    <div class="fixed inset-0 health-horizon opacity-40 z-0"></div>
    <!-- Splash Screen Container -->
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center px-8">
        <!-- Animated Feel (Static HTML) - Logo Cluster -->
        <div class="flex flex-col items-center space-y-12">
            <!-- Abstract Medical Cross / Pulse Icon -->
            <div class="relative flex items-center justify-center">
                <div class="absolute w-32 h-32 bg-primary/10 rounded-full blur-3xl"></div>
                <div
                    class="relative w-24 h-24 signature-gradient rounded-[2rem] flex items-center justify-center shadow-[0_20px_40px_rgba(0,88,188,0.2)]">
                    <span class="material-symbols-outlined text-on-primary text-5xl"
                        style="font-variation-settings: 'FILL' 1;">
                        monitoring
                    </span>
                </div>
            </div>
            <!-- Brand Identity -->
            <div class="text-center">
                <h1 class="font-headline font-extrabold text-5xl tracking-tighter text-primary">
                    VitaTrack
                </h1>
                <p class="mt-4 font-body text-secondary tracking-wide uppercase text-sm font-medium">
                    Precision Medical Wellness
                </p>
            </div>
        </div>
        <!-- Footer Elements -->
        <div class="absolute bottom-16 flex flex-col items-center space-y-6">
            <!-- Loading Indicator (Static Representation) -->
            <div class="w-48 h-1 bg-surface-container rounded-full overflow-hidden">
                <div class="h-full signature-gradient w-1/3 rounded-full"></div>
            </div>
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-tertiary text-sm"
                    style="font-variation-settings: 'FILL' 1;">
                    verified_user
                </span>
                <p class="text-xs font-label text-outline uppercase tracking-[0.2em]">
                    Secure Clinical Connection
                </p>
            </div>
        </div>
    </main>
    <!-- Asymmetric Decorative Elements (Editorial Style) -->
    <div class="fixed -top-24 -right-24 w-96 h-96 bg-primary-fixed/20 rounded-full blur-[100px] z-0"></div>
    <div class="fixed -bottom-48 -left-48 w-[32rem] h-[32rem] bg-tertiary-fixed/10 rounded-full blur-[120px] z-0"></div>
    <!-- Background Imagery (Subtle context) -->
    <div class="fixed inset-0 pointer-events-none opacity-5 z-0">
        <img class="w-full h-full object-cover grayscale"
            data-alt="clean minimal futuristic medical laboratory interior with soft white lighting and blurred high-tech medical equipment in background"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBVI0xIsjIvYi03KEVrSKuXBamdx9aPlx8wWvTfxQ-ncy5Jqu7sLqPA8CUQmLjFxk_bFi9ZEFyRv2ITYhIodNfS8zhDDjKlhuRWv5ML2n1ziYwDMn4SKpHrdEjT1H7I2w_BFnm8MWAEaaI__8oa_sZDaE7J1LdO5vfNdxExUDghqAzJHsyg5jC8GzBgchYp1u_1TI_Ep_P_C6s3SuKE4Ziw83RoQYWpAjgY1uQhjbgSHfQhjK9-XwqHNB7NUpqshbkt3Q717NOk4M" />
    </div>
</body>

</html>
