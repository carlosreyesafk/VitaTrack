<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#f7fff2",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9fe",
                        "secondary-fixed-dim": "#c6c6cb",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-fixed-variant": "#46464b",
                        "secondary-fixed": "#e3e2e7",
                        "surface-variant": "#e2e2e7",
                        "on-tertiary-fixed": "#002107",
                        "tertiary-fixed-dim": "#53e16f",
                        "surface-dim": "#d9dade",
                        "on-primary-fixed": "#001a41",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2e3034",
                        "surface-container-highest": "#e2e2e7",
                        "surface-container": "#ededf2",
                        "surface-container-high": "#e8e8ed",
                        "inverse-on-surface": "#f0f0f5",
                        "outline-variant": "#c1c6d7",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#008733",
                        "on-surface": "#1a1c1f",
                        "secondary-container": "#e0dfe4",
                        "secondary": "#5d5e63",
                        "outline": "#717786",
                        "surface-tint": "#005bc1",
                        "error": "#ba1a1a",
                        "primary-container": "#0070eb",
                        "on-secondary": "#ffffff",
                        "tertiary": "#006b27",
                        "on-surface-variant": "#414755",
                        "tertiary-fixed": "#72fe88",
                        "on-background": "#1a1c1f",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-fixed-variant": "#004493",
                        "surface-container-low": "#f3f3f8",
                        "primary": "#0058bc",
                        "on-secondary-container": "#626267",
                        "inverse-primary": "#adc6ff",
                        "on-primary-container": "#fefcff",
                        "on-tertiary-fixed-variant": "#00531c",
                        "on-error-container": "#93000a",
                        "background": "#f9f9fe",
                        "surface": "#f9f9fe",
                        "on-secondary-fixed": "#1a1b1f"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .health-horizon {
            background: radial-gradient(circle at 0% 0%, #d8e2ff 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #f3f3f8 0%, transparent 40%);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface min-h-screen health-horizon">
    <!-- TopAppBar Shell -->
    <header
        class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg shadow-[0_20px_40px_rgba(26,28,31,0.04)]">
        <div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
            <div class="flex items-center gap-4">
                <button class="text-blue-600 dark:text-blue-400 active:scale-95 transition-transform duration-200">
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                </button>
                <h1 class="text-blue-700 dark:text-blue-400 font-extrabold tracking-tighter font-['Manrope'] text-xl">
                    VitaTrack</h1>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <!-- Navigation suppressed for linear journey (Register) -->
            </div>
            <div class="w-10"></div> <!-- Spacer for symmetry -->
        </div>
    </header>
    <main class="pt-24 pb-12 px-6 flex flex-col items-center justify-center min-h-screen">
        <div class="w-full max-w-md">
            <!-- Header Section -->
            <div class="mb-10 text-center md:text-left">
                <h2 class="font-headline font-bold text-3xl text-on-surface tracking-tight mb-3">Comienza tu viaje</h2>
                <p class="text-on-surface-variant body-lg leading-relaxed">Únete a la nueva era del seguimiento de salud
                    personalizado con VitaTrack.</p>
            </div>
            <!-- Form Container -->
            <div
                class="bg-surface-container-lowest p-8 md:p-10 rounded-lg shadow-[0_20px_40px_rgba(26,28,31,0.04)] relative overflow-hidden">
                <!-- Decorative element (Asymmetry) -->
                <div class="absolute -top-12 -right-12 w-24 h-24 bg-primary/5 rounded-full blur-2xl"></div>
                <form class="space-y-6">
                    <!-- Field: Nombre completo -->
                    <div class="space-y-2">
                        <label
                            class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1"
                            for="name">Nombre completo</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
                            <input
                                class="w-full h-14 pl-12 pr-4 bg-surface-container border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/60 outline-none"
                                id="name" placeholder="Ej: Dr. Julian Carter" type="text" />
                        </div>
                    </div>
                    <!-- Field: Correo electrónico -->
                    <div class="space-y-2">
                        <label
                            class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1"
                            for="email">Correo electrónico</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
                            <input
                                class="w-full h-14 pl-12 pr-4 bg-surface-container border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/60 outline-none"
                                id="email" placeholder="nombre@vitatrack.com" type="email" />
                        </div>
                    </div>
                    <!-- Field: Contraseña -->
                    <div class="space-y-2">
                        <label
                            class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1"
                            for="password">Contraseña</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
                            <input
                                class="w-full h-14 pl-12 pr-12 bg-surface-container border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/60 outline-none"
                                id="password" placeholder="••••••••" type="password" />
                            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface"
                                type="button">
                                <span class="material-symbols-outlined text-[20px]">visibility</span>
                            </button>
                        </div>
                    </div>
                    <!-- Field: Confirmar contraseña -->
                    <div class="space-y-2">
                        <label
                            class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1"
                            for="confirm-password">Confirmar contraseña</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">verified_user</span>
                            <input
                                class="w-full h-14 pl-12 pr-4 bg-surface-container border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/60 outline-none"
                                id="confirm-password" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <!-- Submit Button -->
                    <div class="pt-4">
                        <button
                            class="w-full h-[4.5rem] bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-md shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3"
                            type="submit">
                            <span>Crear cuenta</span>
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>
                </form>
            </div>
            <!-- Bottom Link -->
            <p class="mt-8 text-center text-on-surface-variant body-lg">
                ¿Ya tienes una cuenta?
                <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">Iniciar
                    sesión</a>
            </p>
        </div>
        <!-- Trust Indicator (Editorial Detail) -->
        <div class="mt-16 flex flex-col items-center gap-6 opacity-60">
            <p class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">Protección de datos de
                grado médico</p>
            <div class="flex items-center gap-8 grayscale">
                <div
                    class="h-6 w-24 bg-on-surface-variant/10 rounded flex items-center justify-center text-[10px] font-bold">
                    HIPAA COMPLIANT</div>
                <div
                    class="h-6 w-24 bg-on-surface-variant/10 rounded flex items-center justify-center text-[10px] font-bold">
                    256-BIT AES</div>
            </div>
        </div>
    </main>
    <!-- Visual Anchor / Background Imagery -->
    <div class="fixed bottom-0 right-0 -z-10 w-1/3 h-full overflow-hidden hidden lg:block">
        <div class="absolute bottom-0 right-0 w-full h-3/4 opacity-20 bg-no-repeat bg-bottom bg-contain"
            data-alt="abstract medical wave pattern with clean minimalist lines and soft blue tones on a white background"
            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDTmcGylaHoiJIoJjD22oUYNklQAZ2XKkhOxpLhlN7NFDMgZAj-wX2PJFYUK4JiAaaFnFXzTuHZgnrl4dSLWkjNHEsFyhEifbfLGAn7LdI3CBfD50gBkE7DqxVAwmUgQKiUfpmjib357JQCM6ejjQc5xNOxBSvwhWuYpCaI736Lyf9qevy8HRYB_0pN2LD2KdNTA73tUVn8AKsBu7C6lPe4WB9UeeLQ2idvYalfM1Rj89P735J2SiMwOdJKE7KNPF8d6zj8YYiKrxM')">
        </div>
    </div>
</body>

</html>
